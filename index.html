<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="minicraft3.0.css">
    </head>
    <body class="body">
        
        <ul id="name">Minicraft</ul>
       <ul id="instruction"><li>Instructions : </li>
            <br>
            
        </ul> 
         <ol id="steps">
              <li>Click Right-key for move right</li>
              <br>
              

              <li>Click left-key for move left</li>
              <br>
              

              <li>Click F-key for fire</li>
              <br>
              

            </ol>
           
        <div class="par" id="par">
          <img src="images/starnight.jpeg" id="back">
          
          <div class="child" id="child"><img src="images/f2.png" id="craft"></div>
          <div class="alien" id="alien"><img src="images/Alien1.png" id="ufo"></div>
          <div class="alien2" id="alien2"><img src="images/Alien2.png" id="ufo"></div>
          <div class="alien3" id="alien3"><img src="images/Alien3.png" id="ufo"></div>
          <div class="start" id= "start" onclick="start()">play</div>
          <div class="start1" id= "start2" onclick="start1()">Start</div>
        </div>
       
        
      <p id="para">Score:</p>
        <div id="shoot"></div>
        <div id="over"> oop's Aliens destroyed planet<div id="show"></div><img src="images/f2.png" id="craftover">
        <img id="win" src="images/bossbackground.jpg">
      </div>
      <div id="level1">Captain all alien destroyed ! 
        <button class="buttn"><a href="minicraft3.0.html" id="lvlup"> Go to Bosslevel</a></button>
      </div>
  
      <a href="index.html" id="again">Play again</a>
      
        <audio src="audio/game-over.mp3" id="aud1"></audio>
        <audio src="audio/plasma.mp3" id="aud2"></audio>
        <audio src="audio/explode.mp3" id="aud3"></audio>
        <audio src="audio/lock3.mp3" id="aud4"></audio>
        <audio src="audio/a5.mp3" id="aud5"></audio>
        <audio src="audio/a6.mp3" id="aud6"></audio>
        <audio src="audio/M2.mp3" id="aud7"></audio>
        <audio src="audio/au10.mp3" id="aud8"></audio>
        <audio src="audio/bg3.mp3" id="aud9"></audio>
        
        <div id="mobile-controls">
            <button class="control-btn" id="btn-left" aria-label="Move Left">
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>
            <button class="control-btn" id="btn-fire" aria-label="Fire Weapon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
                    <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="2" fill="none" opacity="0.6"/>
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="control-btn" id="btn-right" aria-label="Move Right">
                <svg viewBox="0 0 24 24">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            </button>
        </div>

        <script src="mobile-controls.js"></script>
        <script src="minicraft2.0.js"></script>
        
    </body>  
</html>
